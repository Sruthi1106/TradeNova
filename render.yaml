services:
  - type: web
    name: ttcrypto-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8080
      - key: SERVER_SERVLET_CONTEXT_PATH
        value: /api/v1
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_SQL_INIT_MODE
        value: always
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_REGISTRATION_INITIALIZE_WALLETS
        value: "false"
      - key: SPRING_WEB_CORS_ALLOWED_ORIGINS
        value: https://trade-nova-orpin.vercel.app,https://sruthia05.vercel.app,https://ttcrypto-frontend.onrender.com
      - key: SPRING_WEB_CORS_ALLOW_CREDENTIALS
        value: "false"
      - key: SPRING_WEBSOCKET_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: ttcrypto-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_WS_URL
        sync: false
