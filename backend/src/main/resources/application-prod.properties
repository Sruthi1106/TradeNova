spring.application.name=ttcrypto-trading-platform

# Server Configuration
server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/api/v1}

# Database Configuration - Production (Aiven Cloud MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool Configuration - Aiven
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging Configuration
logging.level.root=WARN
logging.level.com.ttcrypto=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Registration behavior
app.registration.initialize-wallets=${APP_REGISTRATION_INITIALIZE_WALLETS:false}

# CORS Configuration - Production
cors.allowed-origins=${SPRING_WEB_CORS_ALLOWED_ORIGINS:https://trade-nova-orpin.vercel.app,https://sruthia05.vercel.app}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=${SPRING_WEB_CORS_ALLOW_CREDENTIALS:false}

# WebSocket Configuration
websocket.allowed-origins=${SPRING_WEBSOCKET_ALLOWED_ORIGINS:https://trading.yourdomain.com}

# Server Error Handling
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# SSL Configuration
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store-type=PKCS12
server.ssl.key-store=classpath:application.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-alias=tomcat
